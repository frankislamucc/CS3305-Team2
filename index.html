<!DOCTYPE html>
<html>
<head>
  <title>MediaPipe Hands Test</title>
  <style>
    canvas { position: absolute; top: 0; left: 0; }
    video { 
      position: absolute; 
      top: 10px; 
      right: 10px; 
      width: 200px; 
      height: 150px; 
      border: 2px solid #333; 
      border-radius: 5px;
      z-index: 10;
      transform: scaleX(-1);
    }
    #videoOverlay {
      position: absolute;
      top: 10px;
      right: 10px;
      width: 200px;
      height: 150px;
      pointer-events: none;
      z-index: 11;
      transform: scaleX(-1);
    }
  </style>
</head>
<body>

<video id="video" autoplay></video>
<canvas id="videoOverlay"></canvas>
<canvas id="canvas"></canvas>
<canvas id="uiCanvas"></canvas>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

<script type="module" src="script.js"></script>

<div style="position: fixed; bottom: 20px; right: 20px; z-index: 1000; display: flex; gap: 10px;">
  <button id="clearBtn" style="padding: 10px 20px; font-size: 14px; border-radius: 5px; background: #ff4444; color: white; border: none; cursor: pointer;">Clear</button>
  <button id="zoomInBtn" style="padding: 10px 20px; font-size: 18px; border-radius: 5px; background: white; border: 1px solid #ccc; cursor: pointer;">+</button>
  <button id="zoomOutBtn" style="padding: 10px 20px; font-size: 18px; border-radius: 5px; background: white; border: 1px solid #ccc; cursor: pointer;">-</button>
  <button id="resetViewBtn" style="padding: 10px 20px; font-size: 14px; border-radius: 5px; background: white; border: 1px solid #ccc; cursor: pointer;">Reset</button>
</div>

</body>
</html>
